<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 2 | Bird Dog Capital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #4A2C5A;
            --purple-mid: #5D3A6A;
            --purple-light: #7B4F8A;
            --cream: #FAF9F7;
            --white: #FFFFFF;
            --charcoal: #2D2D2D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--charcoal);
            background: var(--purple-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--white);
            text-decoration: none;
        }

        .back-link {
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .video-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 40px 40px;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--white);
            margin-bottom: 10px;
            text-align: center;
        }

        .video-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 25px;
            text-align: center;
            max-width: 700px;
            line-height: 1.6;
        }

        .cta-section {
            text-align: center;
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-button {
            display: inline-block;
            background: var(--white);
            color: var(--purple-dark);
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }

        .cta-button.secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid rgba(255,255,255,0.5);
        }

        .cta-button.secondary:hover {
            border-color: var(--white);
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .logo {
                font-size: 20px;
            }

            .video-container {
                padding: 15px 20px 30px;
            }

            .video-title {
                font-size: 24px;
            }

            .video-subtitle {
                font-size: 14px;
            }

            .cta-section {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Bird Dog Capital</a>
        <a href="index.html" class="back-link">← Back to Site</a>
    </header>

    <div class="video-container">
        <h1 class="video-title">AI-Enhanced Lead Qualification</h1>
        <p class="video-subtitle">
            Deterministic qualification meets AI-powered conversation. Qualified leads get 24/7 access to an assistant that knows Bird Dog's criteria, track record, and team.
        </p>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/w3yfVIYVhbo?rel=0&modestbranding=1&showinfo=0" 
                title="Bird Dog Capital Demo 2"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="cta-section">
            <a href="index.html#contact" class="cta-button">Start a Conversation</a>
            <a href="demo.html" class="cta-button secondary">Watch Demo 1</a>
        </div>
    </div>
</body>
</html>
